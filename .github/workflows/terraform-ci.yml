name: Terraform AI Generator CI

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Upgrade pip
      run: python -m pip install --upgrade pip

    - name: Install dependencies
      run: pip install -r requirements.txt --break-system-packages
      working-directory: iac-ai-generator

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    # - name: Generate Terraform (mock)
    #   run: |
    #     mkdir -p output

    #     cat <<EOF > output/main.tf
    #     resource "null_resource" "test" {}
    #     EOF

    #     cat <<EOF > output/outputs.tf
    #     output "test_id" {
    #       value = null_resource.test.id
    #     }
    #     EOF
    #   working-directory: iac-ai-generator

    - name: Run FastAPI & generate Terraform
      run: |
        cd iac-ai-generator
        uvicorn app.main:app --host 127.0.0.1 --port 8000 &
        sleep 5
        curl -X POST http://127.0.0.1:8000/generate \
          -H "Content-Type: application/json" \
          -d '{"requirement":"Create AKS cluster"}'

    - name: Terraform Init
      run: terraform init
      working-directory: iac-ai-generator/output

    - name: Terraform Validate
      run: terraform validate
      working-directory: iac-ai-generator/output