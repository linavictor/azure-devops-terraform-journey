name: Terraform CI

on:
  push:
    branches:
      - main

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # -------------------------------
      # 🐍 Setup Python
      # -------------------------------
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r iac-ai-generator/requirements.txt

      # -------------------------------
      # 🚀 Start FastAPI
      # -------------------------------
      - name: Start FastAPI server
        run: |
          cd iac-ai-generator
          nohup uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 5

      # -------------------------------
      # 🧠 Generate Terraform
      # -------------------------------
      - name: Generate Terraform via API
        run: |
          curl -X POST http://localhost:8000/generate \
          -H "Content-Type: application/json" \
          -d '{"requirement": "Create a network", "cloud": "aws"}'

      # -------------------------------
      # 🔍 Debug (VERY useful)
      # -------------------------------
      - name: Show Generated Files
        run: ls -l iac-ai-generator/output

      - name: Show main.tf
        run: cat iac-ai-generator/output/main.tf

      # -------------------------------
      # ⚙️ Terraform INIT + VALIDATE
      # -------------------------------
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: iac-ai-generator/output

      - name: Terraform Validate
        run: terraform validate
        working-directory: iac-ai-generator/output

      # -------------------------------
      # 🔥 (Optional) Mock for Plan/Apply
      # -------------------------------
      - name: Clean output completely
        run: |
          rm -rf iac-ai-generator/output
          mkdir -p iac-ai-generator/output

      - name: Create Mock Terraform
        run: |
          mkdir -p iac-ai-generator/output

          cat <<EOF > iac-ai-generator/output/main.tf
          terraform {
            required_providers {
              null = {
                source = "hashicorp/null"
              }
            }
          }

          provider "null" {}

          resource "null_resource" "example" {}
          EOF

              cat <<EOF > iac-ai-generator/output/outputs.tf
          output "example_id" {
            value = null_resource.example.id
          }
          EOF

      - name: Terraform Init (Mock)
        run: terraform init
        working-directory: iac-ai-generator/output

      - name: Terraform Plan
        run: terraform plan -out=tfplan
        working-directory: iac-ai-generator/output

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        working-directory: iac-ai-generator/output